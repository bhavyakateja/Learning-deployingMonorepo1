services:

  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bhavya65
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: .
      dockerfile: ./docker/Dockerfile.backend
    container_name: todo-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    # environment:
    #   - DATABASE_URL=postgresql://postgres:bhavya65@postgres:5432/postgres

  websocket:
    build: 
      context: .
      dockerfile: ./docker/Dockerfile.ws
    container_name: todo-ws-server
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./apps/ws/.env
    # environment:
    #   - DATABASE_URL=postgresql://postgres:bhavya65@postgres:5432/postgres
    
  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - websocket
    environment:
      - NEXT_PUBLIC_WS_URL=ws://websocket:3002
      - BACKEND_URL=http://backend:3001

volumes:
  pgdata: